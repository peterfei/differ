name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            arch: x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-all-crates: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ── macOS 代码签名准备 ──
      - name: Import Apple Developer certificate
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PATH: ${{ runner.temp }}/differ-signing.keychain
        run: |
          # 创建临时钥匙串
          security create-keychain -p "temp" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "temp" "$KEYCHAIN_PATH"

          # 导入证书
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/apple-cert.p12
          security import /tmp/apple-cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/productsign

          # 添加到搜索路径
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "temp" "$KEYCHAIN_PATH"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── 构建 + 签名 + 公证 ──
      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Clean up keychain (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          security delete-keychain "${{ runner.temp }}/differ-signing.keychain" || true

      # ── 上传构建产物 ──
      - name: Upload bundle (macOS .dmg)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: differ-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload bundle (macOS .app)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: differ-${{ matrix.target }}-app
          path: |
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload bundle (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: differ-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ── 创建 Release ──
  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: differ-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR

      - name: Generate release notes
        run: |
          if [ -f RELEASE.md ]; then
            cp RELEASE.md release-notes.md
          else
            echo "Release v${{ github.ref_name }}" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Differ ${{ github.ref_name }}
          body_path: release-notes.md
          draft: true
          prerelease: false
          files: |
            *.dmg
            *.deb
            *.AppImage
